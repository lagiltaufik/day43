name: Flutter CI
on:
  push:
    branches: [main]
jobs:
  tests: 
    name: Analyze flutter test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Flutter install
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: stable
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Analyze project
        run: flutter analyze
        
      - name: Flutter test
        run: flutter test

      - name: Build dubug APK
        run: flutter build apk --debug

      - name: Build release APK
        run: flutter build apk --release --build-number=${{github.run_number}}

      - name: Build DEV APK
        run: flutter build apk --flavor dev --debug --build-number=${{github.run_number}}

      - name: Build PROD APK
        run: flutter build apk --flavor prod --release --build-number=${{github.run_number}}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: all-apks
          path: build/app/outputs/flutter-apk/*.apk
